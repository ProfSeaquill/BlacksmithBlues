<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    >
    <title>Unity Web Player | BlacksmithBlues</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
      }

      body {
        font-family: Arial, sans-serif;
      }

      /* Full browser area */
      #page {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
        overflow: hidden;
      }

      /* The forced 9:16 frame */
      #unity-frame {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100vh;
        background: #000;
        overflow: hidden;
      }

      /* Unity container fills the frame */
      #unity-container {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #000;
      }

      #unity-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 80%;
        max-width: 320px;
        z-index: 20;
      }

      #unity-warning {
        position: absolute;
        left: 50%;
        top: 16px;
        transform: translateX(-50%);
        width: calc(100% - 32px);
        z-index: 30;
      }

      #unity-footer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 25;
      }

      /* Optional: makes the frame look a little cleaner on desktop */
      @media (min-aspect-ratio: 9/16) {
        #unity-frame {
          height: 100vh;
        }
      }

      @media (max-aspect-ratio: 9/16) {
        #unity-frame {
          width: 100vw;
        }
      }
    </style>
  </head>

  <body>
    <div id="page">
      <div id="unity-frame">
        <div id="unity-container">
          <canvas id="unity-canvas" tabindex="-1"></canvas>

          <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
              <div id="unity-progress-bar-full"></div>
            </div>
          </div>

          <div id="unity-warning"></div>

          <div id="unity-footer">
            <div id="unity-logo-title-footer"></div>
            <div id="unity-fullscreen-button"></div>
            <div id="unity-build-title">BlacksmithBlues</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.querySelector("#unity-canvas");
      const unityFrame = document.querySelector("#unity-frame");

      function unityShowBanner(msg, type) {
        const warningBanner = document.querySelector("#unity-warning");

        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        const div = document.createElement("div");
        div.innerHTML = msg;
        div.style.padding = "10px";
        div.style.marginBottom = "8px";

        if (type === "error") {
          div.style.background = "red";
          div.style.color = "white";
        } else if (type === "warning") {
          div.style.background = "yellow";
          div.style.color = "black";
        } else {
          div.style.background = "white";
          div.style.color = "black";
        }

        warningBanner.appendChild(div);

        if (type !== "error") {
          setTimeout(() => {
            if (div.parentNode === warningBanner) {
              warningBanner.removeChild(div);
              updateBannerVisibility();
            }
          }, 5000);
        }

        updateBannerVisibility();
      }

      function resizeUnityFrame() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const targetRatio = 9 / 16;

        let width = vw;
        let height = width / targetRatio;

        if (height > vh) {
          height = vh;
          width = height * targetRatio;
        }

        unityFrame.style.width = width + "px";
        unityFrame.style.height = height + "px";
      }

      resizeUnityFrame();
      window.addEventListener("resize", resizeUnityFrame);
      window.addEventListener("orientationchange", resizeUnityFrame);

      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/BlacksmithBluesTest3.loader.js";

      const config = {
        arguments: [],
        dataUrl: buildUrl + "/BlacksmithBluesTest3.data.unityweb",
        frameworkUrl: buildUrl + "/BlacksmithBluesTest3.framework.js.unityweb",
        codeUrl: buildUrl + "/BlacksmithBluesTest3.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "BlacksmithBlues",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      // Uncomment this if mobile performance needs help:
      // config.devicePixelRatio = 1;

      document.querySelector("#unity-loading-bar").style.display = "block";

      const script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";

          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

          // Recalculate once Unity is loaded, just in case browser chrome changed the viewport
          resizeUnityFrame();
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
